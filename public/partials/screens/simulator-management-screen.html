<div id="simulator-management-screen" class="screen hidden">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">ניהול מאמנים</h1>
            <div class="text-sm text-gray-500">תמונת מצב וסטטיסטיקות</div>
        </div>
        
        <div class="flex gap-2 bg-white p-2 rounded-lg shadow-sm border">
            <select id="sim-filter-period" class="text-sm border-gray-300 rounded-md focus:ring-ofer-orange">
                <option value="">כל התקופות</option>
            </select>
            <select id="sim-filter-month" class="text-sm border-gray-300 rounded-md focus:ring-ofer-orange">
                <option value="">כל החודשים</option>
                <option value="0">ינואר</option><option value="1">פברואר</option><option value="2">מרץ</option>
                <option value="3">אפריל</option><option value="4">מאי</option><option value="5">יוני</option>
                <option value="6">יולי</option><option value="7">אוגוסט</option><option value="8">ספטמבר</option>
                <option value="9">אוקטובר</option><option value="10">נובמבר</option><option value="11">דצמבר</option>
            </select>
        </div>
    </div>

    <div id="simulators-dashboard-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 mb-6">
    </div>

    <div class="flex justify-end border-t pt-4">
        <button onclick="window.openGlobalCloseModal()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg flex items-center gap-2">
            <i class="fas fa-power-off"></i> סגור את כל המאמנים להיום
        </button>
    </div>
</div>
