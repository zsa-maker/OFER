<div id="mission-database-screen" class="screen hidden">
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <h1 class="text-3xl font-bold text-gray-800">מאגר גיחות</h1>

        <div id="admin-delete-controls"
            class="hidden flex flex-col md:flex-row items-end gap-2 bg-red-50 p-3 rounded-lg border border-red-200">
            <div class="flex flex-col">
                <span class="text-xs text-red-600 font-bold mb-1">מחיקת גיחות בטווח (מנהל בלבד)</span>
                <div class="flex gap-2">
                    <input type="date" id="delete-start-date" class="border p-1 rounded text-sm" placeholder="מתאריך">
                    <input type="date" id="delete-end-date" class="border p-1 rounded text-sm" placeholder="עד תאריך">
                </div>
            </div>
            <button id="delete-range-btn" onclick="window.deleteFlightsInRange()"
                class="bg-red-600 hover:bg-red-700 text-white font-bold py-1 px-4 rounded shadow-md text-sm h-8"> מחק
                טווח
            </button>
        </div>
    </div>

    <div id="filter-section" class="bg-white rounded-lg shadow-md p-4 mb-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-700 border-b pb-2">סינון גיחות</h2>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div>
                <label for="db-filter-period" class="block text-sm font-medium text-gray-700 mb-1">תקופה</label>
                <select id="db-filter-period" onchange="missionDatabase.applyFilters()"
                    class="block w-full border-gray-300 rounded-md shadow-sm"></select>
            </div>
            <div>
                <label for="db-filter-week" class="block text-sm font-medium text-gray-700 mb-1">שבוע</label>
                <select id="db-filter-week" onchange="missionDatabase.applyFilters()"
                    class="block w-full border-gray-300 rounded-md shadow-sm"></select>
            </div>
            <div>
                <label class="text-xs font-bold text-gray-600">תאריך</label>
                <input type="date" id="db-filter-date" onchange="missionDatabase.applyFilters()"
                    class="border rounded p-1 text-sm">
            </div>
            <div>
                <label for="db-filter-status" class="block text-sm font-medium text-gray-700 mb-1">מצב גיחה</label>
                <select id="db-filter-status" onchange="missionDatabase.applyFilters()"
                    class="block w-full border-gray-300 rounded-md shadow-sm">
                    <option value="">הכל</option>
                </select>
            </div>
            <div>
                <label for="db-filter-type" class="block text-sm font-medium text-gray-700 mb-1">סוג גיחה</label>
                <select id="db-filter-type" onchange="missionDatabase.applyFilters()"
                    class="block w-full border-gray-300 rounded-md shadow-sm">
                    <option value="">הכל</option>
                </select>
            </div>
            <div>
                <label for="db-filter-flight-name" class="block text-sm font-medium text-gray-700 mb-1">שם גיחה</label>
                <select id="db-filter-flight-name" onchange="missionDatabase.applyFilters()"
                    class="block w-full border-gray-300 rounded-md shadow-sm">
                    <option value="">הכל</option>
                </select>
            </div>

            <div>
                <label for="db-filter-simulator" class="block text-sm font-medium text-gray-700 mb-1">סימולטור</label>
                <select id="db-filter-simulator" onchange="missionDatabase.applyFilters()"
                    class="block w-full border-gray-300 rounded-md shadow-sm">
                    <option value="">הכל</option>
                </select>
            </div>

            <div>
                <label for="db-filter-pilot" class="block text-sm font-medium text-gray-700 mb-1">טייס</label>
                <select id="db-filter-pilot" onchange="missionDatabase.applyFilters()"
                    class="block w-full text-base border-gray-300 focus:outline-none focus:ring-ofer-orange focus:border-ofer-orange rounded-md shadow-sm">
                    <option value="">הכל</option>
                </select>
            </div>

            <!-- <div>
                <label for="db-filter-instructor" class="block text-sm font-medium text-gray-700 mb-1">מדריך</label>
                <select id="db-filter-instructor" onchange="missionDatabase.applyFilters()"
                    class="block w-full border-gray-300 rounded-md shadow-sm">
                    <option value="">הכל</option>
                </select>
            </div> -->
            <div>
                <label for="db-filter-instructorFem" class="block text-sm font-medium text-gray-700 mb-1">מדריכה</label>
                <select id="db-filter-instructorFem" onchange="missionDatabase.applyFilters()"
                    class="block w-full border-gray-300 rounded-md shadow-sm">
                    <option value="">הכל</option>
                </select>
            </div>
        </div>

        <div class="mt-4 flex justify-end">
            <button onclick="missionDatabase.clearFilters()"
                class="text-sm text-gray-500 hover:text-ofer-orange underline">
                נקה סינון
            </button>
        </div>
    </div>
    <div class="mb-4 flex justify-between items-center hidden" id="bulk-actions-container">
        <span class="text-sm text-gray-600">פעולות על גיחות נבחרות (<span id="selected-count-label">0</span>):</span>
        <div class="flex gap-2">
            <button id="export-selected-btn" onclick="missionDatabase.exportSelectedToExcel()"
                class="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700 transition">
                <i class="fas fa-file-excel ml-1"></i> ייצא לאקסל (CSV)
            </button>
            <button id="delete-selected-btn" onclick="missionDatabase.deleteSelected()"
                class="bg-red-600 text-white px-4 py-2 rounded shadow hover:bg-red-700 transition">
                מחק גיחות
            </button>
        </div>
    </div>

    <div id="flight-table-container-db" class="bg-white rounded-lg shadow-md p-4 overflow-x-auto  margin-top-10px">

        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" id="admin-col-header" class="px-4 py-3 text-right hidden" style="width: 40px;">
                        <input type="checkbox" id="select-all-flights">
                    </th>
                    <th scope="col"
                        class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">#</th>
                    <th scope="col"
                        class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">סטטוס
                    </th>
                    <th scope="col"
                        class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">התחלה
                    </th>
                    <th scope="col"
                        class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">סיום
                    </th>
                    <th scope="col"
                        class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">סוג</th>
                    <th scope="col"
                        class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">שם גיחה
                    </th>
                    <th scope="col"
                        class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">מדריכה
                    </th>
                    <th scope="col"
                        class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">תאריך
                    </th>
                </tr>
            </thead>
            <tbody id="flight-table-body-db" class="bg-white divide-y divide-gray-200"></tbody>
        </table>
    </div>

    <div id="admin-management-footer" class="mt-4 flex justify-end hidden">
        <button onclick="missionDatabase.toggleSelectionMode()"
            class="bg-gray-700 hover:bg-gray-800 text-white font-bold py-2 px-6 rounded-full shadow-lg transition transform hover:-translate-y-1">
            <i class="fas fa-check-square ml-2"></i> מצב בחירת גיחות
        </button>
    </div>
</div>
