<div id="fault-database-screen" class="screen hidden">
    <h1 class="text-3xl font-bold text-gray-800 mb-4">מאגר תקלות וסטטיסטיקות</h1>

    <div class="mb-4 border-b border-gray-200 flex justify-between items-center">
        <nav class="-mb-px flex space-x-8 space-x-reverse">
            <button id="fault-tab-btn-table" onclick="window.switchFaultTab('table')"
                class="border-ofer-orange text-ofer-orange whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-colors">
                רשימת תקלות
            </button>
            <button id="fault-tab-btn-stats" onclick="window.switchFaultTab('stats')"
                class="border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-colors">
                סטטיסטיקות תקלות
            </button>
        </nav>
        
        <div id="fault-admin-controls-container" class="hidden">
            <button id="toggle-fault-admin-mode-btn" onclick="window.toggleFaultAdminMode()"
                class="bg-gray-700 hover:bg-gray-800 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-colors text-xs ml-2">
                <i class="fas fa-edit"></i> מצב ניהול
            </button>
            <button id="delete-fault-selected-btn" onclick="window.deleteSelectedFaults()"
                class="hidden bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-colors text-xs">
                <i class="fas fa-trash-alt ml-1"></i> מחק (<span id="fault-selected-count">0</span>)
            </button>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow-md p-4 mb-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div>
                <label for="fault-simulator-filter" class="block text-sm font-medium text-gray-700">סימולטור</label>
                <select id="fault-simulator-filter" onchange="window.onFaultFilterChange()"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-ofer-orange focus:border-ofer-orange">
                </select>
            </div>
            
            <div id="fault-status-filter-container">
                <label for="fault-status-filter" class="block text-sm font-medium text-gray-700">סטטוס סגירה</label>
                <select id="fault-status-filter" onchange="window.onFaultFilterChange()"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-ofer-orange focus:border-ofer-orange">
                    <option value="ALL" selected>כל הסטטוסים</option>
                    <option value="OPEN">פתוחה</option>
                    <option value="RESOLVED">טופלה (כללי)</option>
                    <option value="PERMISSION">נסגר בהיתר</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">סנן זמן לפי:</label>
                <select id="fault-time-filter-type"
                    onchange="window.toggleFaultTimeFilters(this.value); window.onFaultFilterChange();"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-ofer-orange focus:border-ofer-orange">
                    <option value="all">כל הזמן</option>
                    <option value="period">תקופה</option>
                    <option value="week">שבוע</option>
                    <option value="range">טווח תאריכים</option>
                </select>
            </div>

            <div id="fault-filter-period-group" class="hidden">
                <label class="block text-sm font-medium text-gray-700">בחירת תקופה:</label>
                <select id="fault-period-select" onchange="window.onFaultFilterChange()"
                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm"></select>
            </div>

            <div id="fault-filter-week-group" class="hidden">
                <label class="block text-sm font-medium text-gray-700">בחירת שבוע:</label>
                <select id="fault-week-select" onchange="window.onFaultFilterChange()"
                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm"></select>
            </div>

            <div id="fault-filter-range-group" class="hidden">
                <div class="flex gap-2">
                    <div class="flex-grow">
                        <label class="block text-[10px] font-medium text-gray-500">מתאריך:</label>
                        <input type="date" id="fault-date-start" onchange="window.onFaultFilterChange()"
                            class="mt-1 block w-full text-xs rounded-md border-gray-300 shadow-sm">
                    </div>
                    <div class="flex-grow">
                        <label class="block text-[10px] font-medium text-gray-500">עד תאריך:</label>
                        <input type="date" id="fault-date-end" onchange="window.onFaultFilterChange()"
                            class="mt-1 block w-full text-xs rounded-md border-gray-300 shadow-sm">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="fault-tab-content-table">
        <div id="fault-database-table-container" class="bg-white rounded-lg shadow-md overflow-x-auto">
            <table class="min-w-full text-right" dir="rtl">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase text-center hidden fault-select-col">
                            <input type="checkbox" onchange="window.toggleAllFaults(this.checked)">
                        </th>
                        <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase">מאמן</th>
                        <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase">תיאור</th>
                        <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase">סיווג מערכת</th>
                        <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase">דווח לראשונה</th>
                        <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase">סטטוס</th>
                    </tr>
                </thead>
                <tbody id="fault-database-body" class="divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </div>

    <div id="fault-tab-content-stats" class="hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-3 rounded-lg shadow-md h-64 flex flex-col">
                <h3 class="text-xs font-bold text-gray-700 mb-2 border-b pb-1">התפלגות סיווגי סגירה</h3>
                <div class="flex-grow relative min-h-0">
                    <canvas id="chart-fault-categories"></canvas>
                </div>
            </div>
            <div class="bg-white p-3 rounded-lg shadow-md h-64 flex flex-col">
                <h3 class="text-xs font-bold text-gray-700 mb-2 border-b pb-1">אימות תקלות (אומת/לא אומת)</h3>
                <div class="flex-grow relative min-h-0">
                    <canvas id="chart-fault-verification"></canvas>
                </div>
            </div>
            <div class="bg-white p-3 rounded-lg shadow-md h-64 flex flex-col">
                <h3 class="text-xs font-bold text-gray-700 mb-2 border-b pb-1">סיווג רמת הפרעה (Severity)</h3>
                <div class="flex-grow relative min-h-0">
                    <canvas id="chart-fault-severity"></canvas>
                </div>
            </div>
            <div class="bg-white p-3 rounded-lg shadow-md h-64 flex flex-col">
                <h3 class="text-xs font-bold text-gray-700 mb-2 border-b pb-1">מצב תקלות (פתוחות/סגורות)</h3>
                <div class="flex-grow relative min-h-0">
                    <canvas id="chart-fault-status-ratio"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>
